name: ci-integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: install
        run: pip install -e ".[dev]"
      - name: lint
        run: ruff check .
      - name: contract test
        run: pytest tests/integration -v
