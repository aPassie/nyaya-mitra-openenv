name: ci-track-b

on:
  push:
    branches: [main, track-b]
    paths:
      - 'src/nyaya_mitra/rewards/**'
      - 'src/nyaya_mitra/case_gen/**'
      - 'src/nyaya_mitra/advisor/**'
      - 'src/nyaya_mitra/interface/**'
      - 'training/**'
      - 'eval/**'
      - 'tests/track_b/**'
      - 'pyproject.toml'
      - '.github/workflows/ci-track-b.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/nyaya_mitra/rewards/**'
      - 'src/nyaya_mitra/case_gen/**'
      - 'src/nyaya_mitra/advisor/**'
      - 'src/nyaya_mitra/interface/**'
      - 'training/**'
      - 'eval/**'
      - 'tests/track_b/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: install
        run: pip install -e ".[track_b,dev]"
      - name: test
        run: pytest tests/track_b -v
