name: ci-track-a

on:
  push:
    branches: [main, track-a]
    paths:
      - 'src/nyaya_mitra/env/**'
      - 'src/nyaya_mitra/citizen/**'
      - 'src/nyaya_mitra/knowledge/**'
      - 'src/nyaya_mitra/profile/**'
      - 'src/nyaya_mitra/interface/**'
      - 'tests/track_a/**'
      - 'pyproject.toml'
      - '.github/workflows/ci-track-a.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/nyaya_mitra/env/**'
      - 'src/nyaya_mitra/citizen/**'
      - 'src/nyaya_mitra/knowledge/**'
      - 'src/nyaya_mitra/profile/**'
      - 'src/nyaya_mitra/interface/**'
      - 'tests/track_a/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: install
        run: pip install -e ".[track_a,dev]"
      - name: test
        run: pytest tests/track_a -v
